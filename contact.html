<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TrustInvest contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="chart.umd.js"></script>

<style>
:root{
  --bg:#0b0614;

  --card:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.12);
  --accent:#ff7ad9;
  --accent2:#7c7cff;
  --text:#fff;
  --muted:#b7b7c9;
}

*{box-sizing:border-box}

body{
  margin:0px;
  font-family:Inter,system-ui;
  background:#fff;
  color:var(--text);
  


  margin:0px;
  font-family:Inter,system-ui;
  color:var(--text);

  /* 3x3 grid with borders */
  background:
    /* rows */
    linear-gradient(
      #000 0px, #000 0.5px, transparent 0.5px, transparent 33.33%,
      #000 33.33%, #000 33.33%, transparent 33.33%, transparent 66.66%,
      #000 66.66%, #000 66.66%, transparent 66.66%, transparent 100%
    ) repeat-y,
    /* columns */
    linear-gradient(
      to right,
      #000 0px, #000 0.5px, transparent 0.5px, transparent 33.33%,
      #000 33.33%, #000 33.33%, transparent 33.33%, transparent 66.66%,
      #000 66.66%, #000 66.66%, transparent 66.66%, transparent 100%
    ) repeat-x,
    /* actual colors of columns */
    linear-gradient(to right, #00B 33.33%, #00D 33.33% 66.66%, #00F 66.66%);
  
  background-size: 100% 33.33%, 33.33% 100%, 100% 100%;



}

/* ===== Layout ===== */
.app{
  display:flex;
  min-height:100vh;
}

/* ===== Sidebar ===== */
.sidebar{
  width:80px;
  background:rgba(0,0,0,.35);
  border-right:1px solid var(--border);
  backdrop-filter:blur(20px);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 20;
}

.logo{
  width:300px;
  height:80px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  margin-bottom:0px;
  align-content: left;
}

.nav-icon{
  width:44px;
  height:44px;
  border-radius:14px;
  background:var(--card);
  border:1px solid var(--border);
  margin-bottom:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.nav-icon.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* ===== Main ===== */
.main{
  flex:1;
  padding:2px;
}

.nav a {
  margin-right: 30px;
  text-decoration: none;
  color:white;
}

.nav a:hover {
  color: var(--accent);
}

/* ===== Header ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:14px;
  margin-bottom:20px;

  color:#000;
  width:97%;
  height:18px;
  background-color: rgba(0, 0, 255, 0); /* semi-transparent to show background */
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px); /* for Safari */
  
}

.header h1{
  font-size:40px;
}

.header a{
  color:white;
  text-decoration:none;
  margin-right:30px;
}
.header a:hover{color:white;}
.moto{
color:#000;
background:#fff;
content:left;
height:70%;
width:40%;
}

/* ===== KPI ===== */
.stats{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px;
  margin-bottom:5px;
}

.stat{
  background:#330E06;
  border:0px solid var(--border);
  border-radius:20px;
  text-align:center;
  padding:0px;
  backdrop-filter:blur(18px);
  width:130px;
  height:80px;
}

.stat span{
  color:var(--muted);
  font-size:13px;
}

.stat h2{
  margin-top:8px;
  font-size:26px;
}

/* ===== Main Card ===== */
.card{
  background:#330E06;
  border:1px solid var(--border);
  border-radius:3px;
  margin-left:150px;
  padding:30px;
  backdrop-filter:blur(24px);
 
  width:75%;
}
.card2{
  background:#330E06;
  border:0px solid var(--border);
  border-radius:26px;
  margin-left:25%;
  padding:30px;
  backdrop-filter:blur(24px);
  box-shadow:0 40px 90px rgba(0,0,0,.6);
  width:50%;
}

.card3{
   background-color: rgba(0, 0, 255, 0); /* semi-transparent to show background */
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px); /* for Safari */
  color:#fff;
  text-align:left;
  font-family:Merriweather;
  border:0px solid var(--border);
  border-radius:26px;
  margin-left:12%;
  padding:5px;


  width:75%;
  }

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:0px;
}

.value{
  font-size:17px;
  font-weight:bold;
}

.badge{
  background:rgba(0,255,120,.15);

  color:#37ff9b;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

/* ===== Chart ===== */
.chart{
  height:200px;
  width:98%;
}

canvas{width:100%!important;height:100%!important}

/* ===== Footer stats ===== */
.footer{
  display:grid;
  grid-template-columns:repeat(1,1fr);
  gap:18px;
  margin-top:5px;

}

/* ===== Tooltip ===== */
.info {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  margin-left: 6px;
  border-radius: 50%;
  font-size: 11px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(130deg,var(--accent),var(--accent2));
  cursor: pointer;
  position: relative;
}

.tooltip {
  position: absolute;
  bottom: 140%;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  background: rgba(20,20,35,0.95);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  box-shadow: 0 20px 50px rgba(0,0,0,.7);
  backdrop-filter: blur(18px);
  opacity: 0;
  pointer-events: none;
  transition: 1s ease;
  z-index: 10;
}

.tooltip strong {
  color: #fff;
}

.info:hover .tooltip {
  opacity: 1;
  pointer-events: auto;
}

/* ================= RESPONSIVE FIXES ================= */

/* Large desktops (already fine, minor safety) */
@media (min-width: 1200px) {
  .main {
    padding: 20px;
  }
}

/* Tablets */
@media (max-width: 1024px) {
  .sidebar {
    width: 90px;
  }

  .logo {
    width: 300px;
    height: 300px;
  }

  .stats,
  .footer {
    grid-template-columns: repeat(2, 1fr);
  }

  .card {
    width: 100%;
  }
}

/* Mobile landscape & small tablets */
@media (max-width: 768px) {
  .app {
    flex-direction: row;
  }

  .sidebar {
    width: 100%;
    height: 1000px;
    flex-direction: column;
    justify-content: center;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }

  .logo {
   align-items: left;
    width:70px;
    height:70px;
  }

  .nav-icon {
    margin: 2 10px;
  }

  .header {
    flex-direction: row;
    align-items: left;
    height: 150px;
    padding: 9px;
  }

  .header a {
    margin-left: 20px;
    margin-top: 6px;
  }

  .stats,
  .footer {
    grid-template-columns: 1fr;
  }

  .card {
    width: 100%;
    padding: 20px;
  }

  .chart {
    height: 160px;
  }
}

/* Small mobile phones */
@media (max-width: 480px) {
  body {
    margin: 0;
  }

  .main {
    padding: 10px;
  }

  .stat h2 {
    font-size: 22px;
  }

  .value {
    font-size: 15px;
  }

  .badge {
    font-size: 11px;
  }

  .tooltip {
    width: 220px;
    font-size: 12px;
  }
}



</style>
</head>

<script>
let navigated = false;

window.addEventListener("scroll", () => {
  if (navigated) return;

  const scrollTop = window.scrollY;
  const windowHeight = window.innerHeight;

  const docHeight = document.documentElement.scrollHeight;

  // Scroll DOWN → go to next page
  if (scrollTop + windowHeight >= docHeight - 5) {
    navigated = true;
    window.location.href = "truth.html";
  }

  // Scroll UP at top → go back home
  if (scrollTop <= 0) {
    navigated = true;
    window.location.href = "services.html";

  }
});
</script>
